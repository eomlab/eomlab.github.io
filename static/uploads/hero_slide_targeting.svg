<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Personalized multi-site flexible neural targeting</title>
  <desc id="desc">A simplified translucent head and brain with multiple illuminated neural targets connected by lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef5ff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4c6cf0"/><stop offset="1" stop-color="#253eaa"/></linearGradient>
    <radialGradient id="brain" cx="45%" cy="42%" r="65%"><stop offset="0" stop-color="#ffffff"/><stop offset="0.45" stop-color="#cfe0ff"/><stop offset="1" stop-color="#8eaae8"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#153c8c" flood-opacity="0.12"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4767d8"/></marker>
  </defs>
  <rect width="960" height="720" rx="42" fill="url(#bg)"/>
  <g opacity="0.32" stroke="#d6e2fb" stroke-width="1">
    <path d="M80 80h800M80 160h800M80 240h800M80 320h800M80 400h800M80 480h800M80 560h800M80 640h800"/>
    <path d="M120 50v620M220 50v620M320 50v620M420 50v620M520 50v620M620 50v620M720 50v620M820 50v620"/>
  </g>
  <text x="480" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#102167">Personalized targeting</text>
  <text x="480" y="136" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#102167">Multi-site / flexible targeting</text>
  <path d="M74 357h150" fill="none" stroke="url(#blue)" stroke-width="34" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.90"/>
  <g transform="translate(250 170)" filter="url(#shadow)">
    <path d="M234 28c-73 4-137 42-171 101-27 47-23 96-20 139 4 64-29 105-43 139 43 35 92 51 148 50 74-2 128-35 167-89 42-57 61-139 50-216C355 75 300 24 234 28z" fill="#f3f8ff" stroke="#bcd0fb" stroke-width="3" opacity="0.85"/>
    <path d="M206 85c-86 0-156 57-156 127 0 47 29 89 75 111 27 13 55 16 87 15 84-3 150-57 150-126S292 85 206 85z" fill="url(#brain)" opacity="0.78" stroke="#a7bbef" stroke-width="2"/>
    <path d="M120 178c49-27 102-27 154 0M114 218c63 26 126 26 188 0M162 135c-17 43-16 101 0 148M224 122c17 58 19 112 6 164M276 142c31 49 37 92 18 133" fill="none" stroke="#ffffff" stroke-width="9" opacity="0.46" stroke-linecap="round"/>
    <path d="M205 245c-32 5-59 30-67 64-6 28 2 54 18 74" fill="none" stroke="#ffffff" stroke-width="22" opacity="0.55" stroke-linecap="round"/>
    <path d="M204 242c-34 8-58 37-60 70" fill="none" stroke="#91aae9" stroke-width="4" opacity="0.55"/>
    <path d="M246 320c20 7 38 25 43 49" fill="none" stroke="#ffffff" stroke-width="18" opacity="0.50" stroke-linecap="round"/>
    <g fill="none" stroke="#88f1ff" stroke-width="4" opacity="0.95">
      <path d="M115 185L195 126L284 160L311 232L243 282L160 250Z"/>
      <path d="M195 126L210 222L284 160"/>
      <path d="M210 222L243 282"/>
    </g>
    <g filter="url(#glow)" fill="#ffffff" stroke="#6eeaff" stroke-width="6">
      <circle cx="115" cy="185" r="16"/><circle cx="195" cy="126" r="16"/><circle cx="284" cy="160" r="16"/><circle cx="311" cy="232" r="16"/><circle cx="243" cy="282" r="16"/><circle cx="160" cy="250" r="16"/><circle cx="210" cy="222" r="18"/>
    </g>
  </g>
  <g transform="translate(122 524)">
    <rect x="0" y="0" width="716" height="78" rx="24" fill="#ffffff" stroke="#c7d6fb" stroke-width="2" filter="url(#shadow)"/>
    <text x="358" y="49" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="1" fill="#102167">PATIENT-SPECIFIC MULTI-SITE THERAPEUTIC TARGETING</text>
